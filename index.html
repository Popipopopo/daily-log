<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Log</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@iconify/iconify@3/dist/iconify.min.js"></script>
<style>
:root{
  --bg:#f7f7f5;
  --paper:#ffffff;
  --ink:#111111;
  --ink2:#555555;
  --ink3:#aaaaaa;
  --rule:#e8e8e8;
  --sans:'Noto Sans SC',sans-serif;
  --mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;}

.shell{max-width:1100px;margin:0 auto;padding:0 32px 64px;}

.topbar{display:flex;align-items:baseline;justify-content:space-between;padding:32px 0 24px;border-bottom:1.5px solid var(--ink);}
.app-title{font-size:24px;font-weight:500;letter-spacing:-.02em;}
.topbar-right{display:flex;align-items:center;gap:20px;}
.sync-txt{font-family:var(--mono);font-size:11px;color:var(--ink3);}
.hdate-txt{font-family:var(--mono);font-size:11px;color:var(--ink2);}

.nav{display:flex;gap:0;border-bottom:1.5px solid var(--rule);margin-bottom:0;}
.tab{font-family:var(--sans);font-size:13px;color:var(--ink3);padding:14px 20px 12px;border:none;background:none;cursor:pointer;border-bottom:1.5px solid transparent;margin-bottom:-1.5px;letter-spacing:.02em;border-radius:2px 2px 0 0;}
.tab:hover{color:var(--ink);}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:500;}

.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--rule);}
.col{padding:28px 0;}
.col-left{border-right:1px solid var(--rule);padding-right:32px;}
.col-right{padding-left:32px;}
.col-title{font-family:var(--mono);font-size:11px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;}

.date-nav{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.dnav-btn{background:none;border:1px solid var(--rule);color:var(--ink2);width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:2px;}
.dnav-btn:hover{border-color:var(--ink);color:var(--ink);}
.dnav-btn:disabled{opacity:.25;cursor:default;}
.dnav-label{font-size:15px;font-weight:500;flex:1;}
.back-btn{font-family:var(--mono);font-size:10px;color:var(--ink3);background:none;border:1px solid var(--rule);padding:3px 8px;cursor:pointer;border-radius:2px;}
.back-btn:hover{border-color:var(--ink);color:var(--ink);}

.entry-list{display:flex;flex-direction:column;margin-bottom:20px;}
.erow{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--rule);}
.erow:last-child{border-bottom:none;}
.etime{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;padding-top:3px;min-width:34px;}
.etxt{flex:1;font-size:14px;color:var(--ink);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.etxt-input{flex:1;font-size:14px;color:var(--ink);line-height:1.6;font-family:var(--sans);border:none;border-bottom:1.5px solid var(--ink);background:transparent;outline:none;resize:none;padding:0;min-height:24px;}
.erow-actions{display:flex;gap:4px;opacity:0;flex-shrink:0;align-items:center;}
.erow:hover .erow-actions{opacity:1;}
.e-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:2px 4px;display:flex;align-items:center;border-radius:2px;}
.e-btn:hover{color:var(--ink);background:#f0f0f0;}
.e-btn.del:hover{color:#c00;}
.e-btn-txt{background:none;border:none;cursor:pointer;font-size:11px;color:var(--ink3);padding:2px 6px;font-family:var(--mono);border-radius:2px;}
.e-btn-txt:hover{color:var(--ink);background:#f0f0f0;}
.empty-txt{font-size:13px;color:var(--ink3);padding:16px 0;}

.input-wrap{display:flex;flex-direction:column;gap:8px;}
.quick-input{width:100%;font-size:14px;color:var(--ink);font-family:var(--sans);border:none;border-bottom:1.5px solid var(--rule);background:transparent;padding:8px 0;resize:none;min-height:36px;max-height:120px;line-height:1.6;outline:none;}
.quick-input:focus{border-bottom-color:var(--ink);}
.quick-input::placeholder{color:var(--ink3);}
.input-actions{display:flex;justify-content:flex-end;}
.record-btn{background:var(--ink);color:#fff;border:none;font-size:12px;font-family:var(--sans);font-weight:500;padding:7px 16px;cursor:pointer;letter-spacing:.02em;display:flex;align-items:center;gap:6px;border-radius:2px;}
.record-btn:hover{opacity:.8;}

.goals-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.add-cat-btn{font-family:var(--mono);font-size:11px;color:var(--ink3);background:none;border:1px solid var(--rule);padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;border-radius:2px;}
.add-cat-btn:hover{border-color:var(--ink);color:var(--ink);}

.cat-block{margin-bottom:20px;}
.cat-block.dragging{opacity:.4;}
.cat-block.drag-over{outline:2px dashed var(--ink3);}
.cat-hdr{display:flex;align-items:center;gap:8px;padding-bottom:8px;border-bottom:1.5px solid var(--ink);margin-bottom:4px;}
.cat-drag{cursor:grab;color:var(--ink3);font-size:12px;opacity:.4;user-select:none;display:flex;align-items:center;}
.cat-drag:hover{opacity:1;}
.cat-name-display{font-size:13px;font-weight:500;flex:1;cursor:pointer;letter-spacing:.02em;text-transform:uppercase;}
.cat-name-display:hover{opacity:.6;}
.cat-name-input{font-size:13px;font-weight:500;flex:1;font-family:var(--sans);border:none;background:transparent;outline:none;border-bottom:1.5px solid var(--ink);text-transform:uppercase;letter-spacing:.02em;}
.cat-count{font-family:var(--mono);font-size:10px;color:var(--ink3);}
.cat-del{background:none;border:none;color:var(--ink3);cursor:pointer;opacity:.4;display:flex;align-items:center;border-radius:2px;padding:2px;}
.cat-del:hover{opacity:1;color:#c00;}

.tree-node{}
.tree-node.drag-over-node>.tree-row{background:#f0f0f0;}
.tree-row{display:flex;align-items:flex-start;gap:6px;padding:5px 0;}
.tree-row:hover{background:#fafafa;}
.node-drag{cursor:grab;color:var(--ink3);opacity:0;user-select:none;flex-shrink:0;margin-top:2px;display:flex;align-items:center;}
.tree-row:hover .node-drag{opacity:.5;}
.exp-btn{width:16px;height:16px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:9px;flex-shrink:0;margin-top:2px;}
.exp-sp{width:16px;flex-shrink:0;}
.node-cb{width:14px;height:14px;cursor:pointer;flex-shrink:0;margin-top:3px;accent-color:var(--ink);}
.node-txt{flex:1;font-size:13px;color:var(--ink);line-height:1.5;word-break:break-word;}
.node-txt.done{text-decoration:line-through;color:var(--ink3);}
.node-acts{display:flex;gap:2px;opacity:0;flex-shrink:0;align-items:center;}
.tree-row:hover .node-acts{opacity:1;}
.nact-btn{background:none;border:none;cursor:pointer;color:var(--ink3);padding:2px 4px;display:flex;align-items:center;border-radius:2px;}
.nact-btn:hover{color:var(--ink);background:#f0f0f0;}
.nact-btn.del:hover{color:#c00;}
.nact-btn-txt{background:none;border:none;cursor:pointer;font-size:10px;color:var(--ink3);padding:2px 5px;font-family:var(--mono);border-radius:2px;}
.nact-btn-txt:hover{color:var(--ink);background:#f0f0f0;}
.children{display:none;}
.children.open{display:block;}
.add-node-row{display:flex;align-items:center;gap:6px;padding:3px 0;}
.add-node-row input{flex:1;font-size:12px;color:var(--ink);font-family:var(--sans);border:none;border-bottom:1px solid var(--rule);background:transparent;outline:none;padding:2px 0;}
.add-node-row input:focus{border-bottom-color:var(--ink);}
.add-node-row input::placeholder{color:var(--ink3);}
.add-node-row button{background:none;border:none;color:var(--ink3);cursor:pointer;display:flex;align-items:center;padding:2px;border-radius:2px;}
.add-node-row button:hover{color:var(--ink);background:#f0f0f0;}

.hist-wrap{padding:28px 0;}
.hist-stats{display:flex;gap:32px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--rule);}
.hstat{display:flex;flex-direction:column;}
.hstat-n{font-size:28px;font-weight:300;color:var(--ink);line-height:1;}
.hstat-l{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:4px;letter-spacing:.06em;text-transform:uppercase;}
.month-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.mtab{font-family:var(--mono);font-size:11px;padding:4px 12px;border:1px solid var(--rule);background:none;color:var(--ink2);cursor:pointer;border-radius:2px;}
.mtab:hover{border-color:var(--ink);color:var(--ink);}
.mtab.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.month-days{display:flex;flex-direction:column;gap:0;}
.day-block{border-top:1px solid var(--rule);padding:16px 0;}
.day-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:10px;}
.day-num{font-size:20px;font-weight:300;color:var(--ink);}
.day-wd{font-family:var(--mono);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;}
.d-items{display:flex;flex-direction:column;}
.d-item{display:flex;gap:12px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--rule);font-size:13px;color:var(--ink);line-height:1.6;}
.d-item:last-child{border-bottom:none;}
.d-time{font-family:var(--mono);font-size:10px;color:var(--ink3);white-space:nowrap;padding-top:3px;min-width:34px;}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="app-title">Daily Log</div>
    <div class="topbar-right">
      <span class="sync-txt" id="sync-status"></span>
      <span class="hdate-txt" id="hdate"></span>
    </div>
  </div>
  <div class="nav">
    <button class="tab on" onclick="showTab('main')">今天 &amp; 目标</button>
    <button class="tab" onclick="showTab('history')">历史</button>
  </div>
  <div id="pMain">
    <div class="main-grid">
      <div class="col col-left" id="colGoals"></div>
      <div class="col col-right" id="colToday"></div>
    </div>
  </div>
  <div id="pHistory" style="display:none"></div>
</div>
<script>
const SB_URL='https://cddgefsnscosrghznxfi.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZGdlZnNuc2Nvc3JnaHpueGZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MTYzOTIsImV4cCI6MjA5MjE5MjM5Mn0.IebSPHTkR4CBsBCGbmzuqXRQRqMssLgXUERQ1F97Ih8';
const HDRS={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const API=SB_URL+'/rest/v1/log';

let days={},categories=[],curTab='main',viewDate='',curMonth='',editingCatId=null,editingEntryId=null;
let dragCatId=null,dragNodeCatId=null,dragNodeId=null;

function tod(){return new Date().toISOString().slice(0,10);}
function nowt(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function uid(){return Date.now()+Math.random();}
function shiftD(d,n){const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('zh-CN',{month:'long',day:'numeric',weekday:'short'});}
function setSyncing(m){const el=document.getElementById('sync-status');if(el)el.textContent=m;}

async function sbGet(key){
  const r=await fetch(`${API}?key=eq.${encodeURIComponent(key)}&select=value`,{headers:HDRS});
  const data=await r.json();return data&&data[0]?data[0].value:null;
}
async function sbSet(key,value){
  await fetch(API+'?on_conflict=key',{method:'POST',headers:{...HDRS,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify({key,value})});
}

async function loadData(){
  setSyncing('加载中…');
  try{
    const[dv,cv]=await Promise.all([sbGet('days'),sbGet('cats')]);
    days=dv?JSON.parse(dv):{};
    categories=cv?JSON.parse(cv):[];
    if(Object.keys(days).length===0&&categories.length===0) await seedData();
  }catch(e){
    days={};categories=[];
    try{days=JSON.parse(localStorage.getItem('dlb_days')||'{}');}catch(e2){}
    try{categories=JSON.parse(localStorage.getItem('dlb_cats')||'[]');}catch(e2){}
    if(Object.keys(days).length===0&&categories.length===0) await seedData();
  }
  setSyncing('');
}

async function save(type){
  setSyncing('保存中…');
  try{
    if(type==='cats'||type==='all') await sbSet('cats',JSON.stringify(categories));
    if(type==='days'||type==='all') await sbSet('days',JSON.stringify(days));
    localStorage.setItem('dlb_days',JSON.stringify(days));
    localStorage.setItem('dlb_cats',JSON.stringify(categories));
    setSyncing('已保存 ✓');setTimeout(()=>setSyncing(''),1500);
  }catch(e){
    localStorage.setItem('dlb_days',JSON.stringify(days));
    localStorage.setItem('dlb_cats',JSON.stringify(categories));
    setSyncing('云端失败，已存本地');
  }
}

async function seedData(){
  const hist={
    '2026-04-18':['看看"恐怖的世界"的实况 不知道有没有能触发灵感的'],
    '2026-04-17':['上班 研究新出的claude design发现是个token粉碎机 做了很多ds components','晚上让刘大爷把辛巴抱下楼','看完了darkwood的实况解说 有点不想自己玩'],
    '2026-03-17':['早上起来学画画 今天是手臂肌肉 学了一半简直要死','躯干那部分画了一下正面的结构好像变得更溜了'],
    '2026-03-16':['看能不能cursor+figma mcp帮我出图（结果没搞）','pricing stuff','又完善了一下小游戏 给qiuyan试玩了一下'],
    '2026-03-15':['研究酒店 终于把圣地亚哥酒店定了','画了人体课作业 感觉这部分真的挺有帮助的','联系了老板 纸胶带稿子','研究小游戏prototype 剧本 研究cursor','上班 做pricing的部分'],
    '2026-03-10':['去办公室 上班'],'2026-02-18':['去乐至'],'2026-02-17':['画了不少稿子的图'],
    '2026-02-04':['收拾行李','开pricing的会','继续准备资料'],
    '2026-02-03':['去办公室上班','准备o1b的文件','赶稿'],
    '2026-02-02':['上班','构思游戏'],'2026-02-01':['卡壳 想构图 画不粗来'],
    '2026-01-31':['上了三张图的色 yeah'],'2026-01-25':['准备定东京-北京的机票 好贵（'],
    '2026-01-24':['画了稿子线稿'],
    '2026-01-19':['去airbnb讨论新产品的一周','周四周五在家做design system','23号晚上敲定了旅行计划 定了机票'],
    '2026-01-18':['11:54 起床，到下午3点半 鸭科夫','看了chatgpt的design system'],
    '2026-01-17':['和mia他们约了火锅 去costco买菜','晚上吃饭 睡了一觉到9点左右','emo在landing 表现的不好 和chatgpt聊天','把签证时间改到了2/9'],
    '2025-08-10':['12点起床，洗漱咖啡'],'2025-08-09':['11点半起床，洗漱 咖啡'],
    '2025-08-08':['9点半起床','9-11点玩手机 browsing','11-12 开会','12-1吃饭','1-3 看小说','3-4锻炼 洗澡','4-5点半 小说','5点半-10点 晚饭 电影','10点半 小说'],
  };
  for(const[d,arr] of Object.entries(hist)) days[d]=arr.map(t=>({id:uid(),text:t,time:''}));
  categories=[
    {id:uid(),name:'创作',nodes:[
      {id:uid(),text:'同人本',done:false,children:[
        {id:uid(),text:'gnosia本 画草稿',done:true,children:[]},
        {id:uid(),text:'setsu本',done:false,children:[]},
      ]},
      {id:uid(),text:'独立游戏「循环迷宫」',done:false,children:[]},
      {id:uid(),text:'给「说出愿望吧」画稿子',done:false,children:[
        {id:uid(),text:'线稿',done:false,children:[]},
      ]},
    ]},
    {id:uid(),name:'制品',nodes:[
      {id:uid(),text:'木质小人',done:true,children:[]},
      {id:uid(),text:'booth虚拟产品 人设',done:false,children:[]},
    ]},
  ];
  await save('all');
}

/* ── TODAY ── */
function renderToday(){
  const d=viewDate||tod();const isT=d===tod();const items=days[d]||[];
  let h=`<div class="col-title">今天</div>
  <div class="date-nav">
    <button class="dnav-btn" onclick="goDate('${shiftD(d,-1)}')"><span class="iconify" data-icon="tabler:chevron-left" data-width="14"></span></button>
    <span class="dnav-label">${fmtDate(d)}</span>
    <button class="dnav-btn" onclick="goDate('${shiftD(d,1)}')" ${isT?'disabled':''} ><span class="iconify" data-icon="tabler:chevron-right" data-width="14"></span></button>
    ${!isT?`<button class="back-btn" onclick="goDate('${tod()}')">今天</button>`:''}
  </div>
  <div class="entry-list">`;
  if(items.length===0){
    h+=`<div class="empty-txt">${isT?'还没有记录，写点什么吧':'这天没有记录'}</div>`;
  } else {
    items.forEach(item=>{
      if(editingEntryId===item.id){
        h+=`<div class="erow">
          <span class="etime">${item.time||''}</span>
          <textarea class="etxt-input" id="edit-${item.id}" onkeydown="handleEditKey(event,${item.id},'${d}')">${esc(item.text)}</textarea>
          <div class="erow-actions" style="opacity:1">
            <button class="e-btn-txt" onclick="saveEdit(${item.id},'${d}')">保存</button>
            <button class="e-btn-txt" onclick="cancelEdit()">取消</button>
          </div>
        </div>`;
      } else {
        h+=`<div class="erow">
          <span class="etime">${item.time||''}</span>
          <span class="etxt" ondblclick="startEdit(${item.id})">${esc(item.text)}</span>
          <div class="erow-actions">
            <button class="e-btn" onclick="startEdit(${item.id})" title="编辑"><span class="iconify" data-icon="tabler:pencil" data-width="13"></span></button>
            <button class="e-btn del" onclick="delEntry('${d}',${item.id})" title="删除"><span class="iconify" data-icon="tabler:trash" data-width="13"></span></button>
          </div>
        </div>`;
      }
    });
  }
  h+=`</div>`;
  if(isT){
    h+=`<div class="input-wrap">
      <textarea class="quick-input" id="qi" placeholder="想到什么就写…" oninput="ar(this)"></textarea>
      <div class="input-actions">
        <button class="record-btn" onclick="addEntry()"><span class="iconify" data-icon="tabler:plus" data-width="14"></span>记下</button>
      </div>
    </div>`;
  }
  document.getElementById('colToday').innerHTML=h;
  if(isT){const el=document.getElementById('qi');if(el)el.focus();}
  if(editingEntryId!==null){
    const el=document.getElementById('edit-'+editingEntryId);
    if(el){el.focus();el.selectionStart=el.value.length;}
  }
}

function ar(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function goDate(d){viewDate=d;renderToday();}

function addEntry(){
  const el=document.getElementById('qi');
  const text=(el?.value||'').trim();if(!text)return;
  const d=tod();if(!days[d])days[d]=[];
  days[d].push({id:uid(),text,time:nowt()});
  save('days');el.value='';el.style.height='';renderToday();
  setTimeout(()=>{const e=document.getElementById('qi');if(e)e.focus();},10);
}

function startEdit(id){editingEntryId=id;renderToday();}
function cancelEdit(){editingEntryId=null;renderToday();}
function handleEditKey(e,id,date){if(e.key==='Escape')cancelEdit();if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(id,date);}}
function saveEdit(id,date){
  const el=document.getElementById('edit-'+id);
  const text=(el?.value||'').trim();if(!text)return;
  const item=(days[date]||[]).find(i=>i.id===id);
  if(item){item.text=text;save('days');}
  editingEntryId=null;renderToday();
}

function delEntry(date,id){
  if(!confirm('删除这条记录？'))return;
  if(!days[date])return;
  days[date]=days[date].filter(i=>i.id!=id);
  save('days');renderToday();
}

/* ── GOALS ── */
function countN(nodes){let t=0,d=0;function w(ns){ns.forEach(n=>{t++;if(n.done)d++;w(n.children||[]);});}w(nodes);return{t,d};}
function findNode(nodes,id){for(const n of nodes){if(n.id===id)return n;const f=findNode(n.children||[],id);if(f)return f;}return null;}
function removeNode(nodes,id){for(let i=0;i<nodes.length;i++){if(nodes[i].id===id){nodes.splice(i,1);return true;}if(removeNode(nodes[i].children||[],id))return true;}return false;}
function findPL(nodes,id){for(const n of nodes){if(n.id===id)return nodes;const f=findPL(n.children||[],id);if(f)return f;}return null;}

function renderGoals(){
  let h=`<div class="goals-hdr"><div class="col-title">目标</div><button class="add-cat-btn" onclick="addCat()"><span class="iconify" data-icon="tabler:plus" data-width="12"></span>新分类</button></div>`;
  categories.forEach(cat=>{
    const{t,d}=countN(cat.nodes);
    const nameHtml=editingCatId===cat.id
      ?`<input class="cat-name-input" id="cni-${cat.id}" value="${esc(cat.name)}" onblur="saveCatName(${cat.id})" onkeydown="if(event.key==='Enter'||event.key==='Escape')this.blur()">`
      :`<span class="cat-name-display" onclick="startEditCat(${cat.id})">${esc(cat.name)}</span>`;
    h+=`<div class="cat-block" draggable="true" data-cid="${cat.id}"
      ondragstart="catDS(event,${cat.id})" ondragover="catDO(event,${cat.id})"
      ondragleave="catDL(event)" ondrop="catDrop(event,${cat.id})">
      <div class="cat-hdr">
        <span class="cat-drag"><span class="iconify" data-icon="tabler:grip-vertical" data-width="14"></span></span>
        ${nameHtml}
        <span class="cat-count">${d}/${t}</span>
        <button class="cat-del" onclick="delCat(${cat.id})"><span class="iconify" data-icon="tabler:x" data-width="14"></span></button>
      </div>
      ${renderNodes(cat.nodes,cat.id,0)}
      <div class="add-node-row" style="padding-left:0">
        <span class="exp-sp"></span>
        <input placeholder="添加到「${esc(cat.name)}」…" id="ani-${cat.id}-root" onkeydown="if(event.key==='Enter')addNode(${cat.id},null)">
        <button onclick="addNode(${cat.id},null)"><span class="iconify" data-icon="tabler:plus" data-width="14"></span></button>
      </div>
    </div>`;
  });
  document.getElementById('colGoals').innerHTML=h;
  if(editingCatId!==null){const el=document.getElementById('cni-'+editingCatId);if(el){el.focus();el.select();}}
}

function renderNodes(nodes,catId,depth){
  if(!nodes||nodes.length===0)return'';
  const indent=(depth+1)*16;let h='';
  nodes.forEach(node=>{
    const hasC=node.children&&node.children.length>0;
    const canAdd=depth<2;
    const expBtn=hasC?`<button class="exp-btn" id="exp-${node.id}" onclick="toggleExp(${node.id})"><span class="iconify" data-icon="tabler:chevron-right" data-width="12"></span></button>`:`<span class="exp-sp"></span>`;
    h+=`<div class="tree-node" draggable="true"
      ondragstart="nodeDS(event,${catId},${node.id})"
      ondragover="nodeDO(event,${node.id})"
      ondragleave="nodeDL(event)"
      ondrop="nodeDrop(event,${catId},${node.id})">
      <div class="tree-row" style="padding-left:${indent}px">
        <span class="node-drag"><span class="iconify" data-icon="tabler:grip-vertical" data-width="12"></span></span>
        ${expBtn}
        <input type="checkbox" class="node-cb" ${node.done?'checked':''} onchange="toggleNode(${catId},${node.id})">
        <span class="node-txt${node.done?' done':''}">${esc(node.text)}</span>
        <div class="node-acts">
          ${canAdd?`<button class="nact-btn-txt" onclick="focusChild(${catId},${node.id})">+ 子项</button>`:''}
          <button class="nact-btn del" onclick="delNode(${catId},${node.id})"><span class="iconify" data-icon="tabler:x" data-width="12"></span></button>
        </div>
      </div>`;
    if(canAdd){
      h+=`<div class="children${hasC?' open':''}" id="ch-${node.id}">
        ${renderNodes(node.children||[],catId,depth+1)}
        <div class="add-node-row" style="padding-left:${indent+16}px" id="acr-${node.id}">
          <span class="exp-sp"></span>
          <input placeholder="添加子项…" id="ani-${catId}-${node.id}" onkeydown="if(event.key==='Enter')addNode(${catId},${node.id})">
          <button onclick="addNode(${catId},${node.id})"><span class="iconify" data-icon="tabler:plus" data-width="14"></span></button>
        </div>
      </div>`;
    }
    h+=`</div>`;
  });
  return h;
}

function toggleExp(id){
  const ch=document.getElementById('ch-'+id);
  const btn=document.getElementById('exp-'+id);
  if(!ch)return;
  const o=ch.classList.toggle('open');
  if(btn){
    const icon=btn.querySelector('.iconify');
    if(icon) icon.setAttribute('data-icon', o?'tabler:chevron-down':'tabler:chevron-right');
  }
}
function focusChild(catId,nodeId){const ch=document.getElementById('ch-'+nodeId);if(ch&&!ch.classList.contains('open'))ch.classList.add('open');const el=document.getElementById(`ani-${catId}-${nodeId}`);if(el)el.focus();}
function startEditCat(id){editingCatId=id;renderGoals();}
function saveCatName(id){const el=document.getElementById('cni-'+id);if(!el)return;const v=el.value.trim();const c=categories.find(x=>x.id===id);if(c&&v)c.name=v;editingCatId=null;save('cats');renderGoals();}
function addCat(){categories.push({id:uid(),name:'新分类',nodes:[]});editingCatId=categories[categories.length-1].id;save('cats');renderGoals();}
function delCat(id){if(!confirm('确定删除这个分类及所有内容？'))return;categories=categories.filter(c=>c.id!==id);save('cats');renderGoals();}
function toggleNode(catId,nodeId){const c=categories.find(x=>x.id===catId);if(!c)return;const n=findNode(c.nodes,nodeId);if(n){n.done=!n.done;save('cats');renderGoals();}}
function addNode(catId,parentId){
  const inputId=`ani-${catId}-${parentId===null?'root':parentId}`;
  const el=document.getElementById(inputId);const text=(el?.value||'').trim();if(!text)return;
  const c=categories.find(x=>x.id===catId);if(!c)return;
  const nn={id:uid(),text,done:false,children:[]};
  if(parentId===null)c.nodes.push(nn);
  else{const p=findNode(c.nodes,parentId);if(p){if(!p.children)p.children=[];p.children.push(nn);}}
  el.value='';save('cats');renderGoals();
}
function delNode(catId,nodeId){if(!confirm('确定删除这个项目？'))return;const c=categories.find(x=>x.id===catId);if(!c)return;removeNode(c.nodes,nodeId);save('cats');renderGoals();}

function catDS(e,id){dragCatId=id;dragNodeId=null;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dragging');}
function catDO(e,id){if(!dragCatId||dragCatId===id)return;e.preventDefault();e.currentTarget.classList.add('drag-over');}
function catDL(e){e.currentTarget.classList.remove('drag-over');}
function catDrop(e,tid){e.currentTarget.classList.remove('drag-over','dragging');if(!dragCatId||dragCatId===tid)return;const fi=categories.findIndex(c=>c.id===dragCatId),ti=categories.findIndex(c=>c.id===tid);if(fi<0||ti<0)return;const[m]=categories.splice(fi,1);categories.splice(ti,0,m);dragCatId=null;save('cats');renderGoals();}
function nodeDS(e,catId,nodeId){dragNodeCatId=catId;dragNodeId=nodeId;dragCatId=null;e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function nodeDO(e,nodeId){if(!dragNodeId||dragNodeId===nodeId)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.tree-node').forEach(el=>el.classList.remove('drag-over-node'));e.currentTarget.classList.add('drag-over-node');}
function nodeDL(e){e.currentTarget.classList.remove('drag-over-node');}
function nodeDrop(e,catId,tid){e.stopPropagation();document.querySelectorAll('.tree-node').forEach(el=>el.classList.remove('drag-over-node'));if(!dragNodeId||dragNodeId===tid||dragNodeCatId!==catId)return;const c=categories.find(x=>x.id===catId);if(!c)return;const fp=findPL(c.nodes,dragNodeId),tp=findPL(c.nodes,tid);if(!fp||!tp||fp!==tp)return;const fi=fp.findIndex(n=>n.id===dragNodeId),ti=fp.findIndex(n=>n.id===tid);if(fi<0||ti<0)return;const[m]=fp.splice(fi,1);fp.splice(ti,0,m);dragNodeId=null;save('cats');renderGoals();}

/* ── HISTORY ── */
function renderHistory(){
  const allDays=Object.keys(days).filter(d=>(days[d]||[]).length>0).sort((a,b)=>b.localeCompare(a));
  const el=document.getElementById('pHistory');
  if(allDays.length===0){el.innerHTML='<div class="hist-wrap"><div style="color:var(--ink3);font-size:13px">还没有任何记录</div></div>';return;}
  const months=[...new Set(allDays.map(d=>d.slice(0,7)))].sort((a,b)=>b.localeCompare(a));
  if(!curMonth||!months.includes(curMonth))curMonth=months[0];
  const total=allDays.reduce((s,d)=>s+(days[d]||[]).length,0);
  let h=`<div class="hist-wrap">
    <div class="hist-stats">
      <div class="hstat"><div class="hstat-n">${allDays.length}</div><div class="hstat-l">天</div></div>
      <div class="hstat"><div class="hstat-n">${total}</div><div class="hstat-l">条记录</div></div>
    </div>
    <div class="month-tabs">`;
  months.forEach(m=>{const[yr,mo]=m.split('-');h+=`<button class="mtab${m===curMonth?' on':''}" onclick="switchMonth('${m}')">${yr}.${mo}</button>`;});
  h+=`</div><div class="month-days">`;
  allDays.filter(d=>d.startsWith(curMonth)).forEach(date=>{
    const items=days[date]||[];const dt=new Date(date+'T12:00:00');
    h+=`<div class="day-block"><div class="day-hdr"><span class="day-num">${dt.getDate()}</span><span class="day-wd">${dt.toLocaleDateString('zh-CN',{weekday:'long'})}</span></div><div class="d-items">`;
    items.forEach(item=>{h+=`<div class="d-item"><span class="d-time">${item.time||''}</span><span>${esc(item.text)}</span></div>`;});
    h+=`</div></div>`;
  });
  h+=`</div></div>`;
  el.innerHTML=h;
}
function switchMonth(m){curMonth=m;renderHistory();}

/* ── TABS ── */
function showTab(t){
  curTab=t;
  document.getElementById('pMain').style.display=t==='main'?'':'none';
  document.getElementById('pHistory').style.display=t==='history'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',['main','history'][i]===t));
  if(t==='history')renderHistory();
}

/* ── INIT ── */
(async()=>{
  document.getElementById('hdate').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  await loadData();
  renderToday();
  renderGoals();
})();
